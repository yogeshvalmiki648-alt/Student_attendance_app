<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Student Attendance System</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background:#f7fafc; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#fff; padding:30px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.05); max-width:380px; width:100%; }
  h1 { color:#2b6cb0; margin-bottom:20px; font-size:1.4rem; text-align:center; }
  .form-group { margin-bottom:15px; }
  label { display:block; margin-bottom:5px; font-weight:600; font-size:0.9rem; }
  input { width:100%; padding:10px 12px; border:1px solid #e2e8f0; border-radius:4px; outline:none; }
  .btn { background:#2b6cb0; color:#fff; padding:10px 15px; border:none; border-radius:4px; cursor:pointer; width:100%; font-weight:600; margin-top:10px; }
  .btn:hover { background:#2c5282; }
  .msg { margin-top:12px; font-size:0.85rem; text-align:center; }
  .error { color:#f56565; }
  a { color:#2b6cb0; text-decoration:none; font-size:0.85rem; }
  .footer { text-align:center; margin-top:15px; }
  .owner-link { text-align:center; margin-top:10px; padding-top:10px; border-top:1px solid #e2e8f0; }
</style>
</head>
<body>
  <div class="card">
    <h1>College Admin Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn">Login</button>
      <div class="msg error" id="errorMsg"></div>
    </form>
    <div class="footer">
      <span>New college? </span><a href="signup.html">Sign Up</a>
    </div>
    <div class="owner-link">
      <a href="admin.html">Owner Panel</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        return;
      }

      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      if (profile && profile.role === 'super_admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
