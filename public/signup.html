<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration - SIAS</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background:#f7fafc; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#fff; padding:30px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.05); max-width:420px; width:100%; }
  .logo { width:80px; height:80px; display:block; margin:0 auto 12px; }
  h1 { color:#2b6cb0; margin-bottom:4px; font-size:1.15rem; text-align:center; }
  .subtitle { text-align:center; color:#718096; font-size:0.85rem; margin-bottom:20px; }
  .form-group { margin-bottom:15px; }
  label { display:block; margin-bottom:5px; font-weight:600; font-size:0.9rem; }
  input { width:100%; padding:10px 12px; border:1px solid #e2e8f0; border-radius:4px; outline:none; }
  .btn { background:#2b6cb0; color:#fff; padding:10px 15px; border:none; border-radius:4px; cursor:pointer; width:100%; font-weight:600; margin-top:10px; }
  .btn:hover { background:#2c5282; }
  .msg { margin-top:12px; font-size:0.85rem; text-align:center; }
  .error { color:#f56565; }
  .success { color:#48bb78; }
  a { color:#2b6cb0; text-decoration:none; font-size:0.85rem; }
  .footer { text-align:center; margin-top:15px; }
</style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="SIAS Logo" class="logo">
    <h1>Saharanpur Institute of Advance Studies</h1>
    <p class="subtitle">Student Registration</p>
    <form id="signupForm">
      <div class="form-group">
        <label for="rollNo">Roll Number</label>
        <input type="text" id="rollNo" required placeholder="e.g. 101">
      </div>
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required placeholder="e.g. Rahul Sharma">
      </div>
      <div class="form-group">
        <label for="course">Course</label>
        <input type="text" id="course" required placeholder="e.g. B.Tech CSE">
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required placeholder="e.g. 9876543210">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6">
      </div>
      <button type="submit" class="btn">Register</button>
      <div class="msg error" id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>
    </form>
    <div class="footer">
      <span>Already registered? </span><a href="login.html">Login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    const COLLEGE_NAME = "Saharanpur Institute of Advance Studies";
    const signupForm = document.getElementById('signupForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      successMsg.textContent = '';

      const rollNo = document.getElementById('rollNo').value;
      const fullName = document.getElementById('fullName').value;
      const course = document.getElementById('course').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabaseClient.auth.signUp({ email, password });

      if (error) {
        errorMsg.textContent = error.message;
        return;
      }

      if (data.session && data.user) {
        const { error: insertError } = await supabaseClient
          .from('students')
          .insert([{
            id: data.user.id,
            roll_no: rollNo,
            name: fullName,
            course: course,
            phone: phone,
            email: email,
            college_name: COLLEGE_NAME,
            is_present: false
          }]);

        if (insertError) {
          errorMsg.textContent = insertError.message;
          return;
        }

        window.location.href = 'index.html';
      } else {
        successMsg.textContent = "Registration successful! Please check your email to confirm, then login.";
      }
    });
  </script>
</body>
</html>
