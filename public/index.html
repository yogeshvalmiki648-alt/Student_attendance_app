<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - SIAS</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #2c5282;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --present-color: #48bb78;
            --absent-color: #f56565;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        header { display:flex; align-items:center; gap:15px; flex-wrap:wrap; margin-bottom: 20px; padding: 20px; background: var(--card-bg); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header img { width:50px; height:50px; }
        header h1 { color: var(--primary-color); font-size:1.1rem; }
        .college-badge { font-size:0.8rem; color:#718096; }
        .logout-btn { background:#edf2f7; border:1px solid var(--border-color); padding:8px 14px; border-radius:4px; cursor:pointer; font-weight:600; color:var(--text-color); margin-left:auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom:20px; }
        .card h2 { margin-bottom: 15px; font-size: 1.1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; color: var(--primary-color); }
        .info-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-color); font-size:0.95rem; }
        .info-row:last-child { border-bottom:none; }
        .info-label { font-weight:600; color:#718096; }
        .mark-btn { background-color: var(--present-color); color: white; padding: 16px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 700; font-size:1.1rem; }
        .mark-btn:hover { opacity:0.9; }
        .mark-btn:disabled { background-color:#a0aec0; cursor:not-allowed; }
        .status-msg { margin-top:12px; text-align:center; font-size:0.9rem; font-weight:600; }
        .status-success { color: var(--present-color); }
        .status-info { color:#718096; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); font-size:0.9rem; }
        th { background-color: #edf2f7; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="SIAS Logo">
            <div>
                <h1>Saharanpur Institute of Advance Studies</h1>
                <p class="college-badge" id="welcomeText">Loading...</p>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </header>

        <div class="card">
            <h2>My Details</h2>
            <div class="info-row"><span class="info-label">Roll Number</span><span id="infoRoll">-</span></div>
            <div class="info-row"><span class="info-label">Name</span><span id="infoName">-</span></div>
            <div class="info-row"><span class="info-label">Course</span><span id="infoCourse">-</span></div>
            <div class="info-row"><span class="info-label">Phone</span><span id="infoPhone">-</span></div>
            <div class="info-row"><span class="info-label">Email</span><span id="infoEmail">-</span></div>
        </div>

        <div class="card">
            <h2>Mark Today's Attendance</h2>
            <button class="mark-btn" id="markBtn">Mark Attendance</button>
            <div class="status-msg" id="statusMsg"></div>
        </div>

        <div class="card">
            <h2>My Attendance History</h2>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Date</th><th>Time</th></tr></thead>
                    <tbody id="attendanceBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="app.js"></script>
</body>
</html>
